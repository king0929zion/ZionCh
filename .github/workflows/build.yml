name: Build and Release ZionChat

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Build and publish release APK"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      CI_FAST_BUILD: "true"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Ensure Gradle wrapper executable
      run: chmod +x gradlew

    - name: Build Debug APK (fast CI)
      run: ./gradlew :app:assembleDebug --stacktrace --build-cache --configuration-cache -PCI_FAST_BUILD=true

    - name: Run tests
      if: github.event_name == 'pull_request'
      run: ./gradlew :app:testDebugUnitTest --stacktrace --build-cache --configuration-cache -PCI_FAST_BUILD=true
      continue-on-error: true

    - name: Get version from build.gradle
      id: get_version
      run: |
        VERSION=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName.*"\([0-9.]*\)".*/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Upload Debug APK to Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ZionChat-debug-v${{ steps.get_version.outputs.version }}
        compression-level: 0
        path: |
          app/build/outputs/apk/debug/*.apk

    - name: Upload build reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports-ci
        path: |
          app/build/reports/
          build/reports/

  release:
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release == true
    runs-on: ubuntu-latest
    env:
      CI_FAST_BUILD: "false"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Ensure Gradle wrapper executable
      run: chmod +x gradlew

    - name: Configure signing (optional)
      env:
        SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      run: |
        if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/zionchat-release.jks"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/zionchat-release.jks" >> $GITHUB_ENV
          echo "SIGNING_STORE_PASSWORD=$SIGNING_STORE_PASSWORD" >> $GITHUB_ENV
          echo "SIGNING_KEY_ALIAS=$SIGNING_KEY_ALIAS" >> $GITHUB_ENV
          echo "SIGNING_KEY_PASSWORD=$SIGNING_KEY_PASSWORD" >> $GITHUB_ENV
        else
          echo "Signing secrets not set; building unsigned release."
        fi

    - name: Build Release APK
      run: ./gradlew :app:assembleRelease --stacktrace --build-cache --configuration-cache -PCI_FAST_BUILD=false

    - name: Get version from build.gradle
      id: get_version
      run: |
        VERSION=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName.*"\([0-9.]*\)".*/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Upload Release APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ZionChat-v${{ steps.get_version.outputs.version }}
        compression-level: 0
        path: |
          app/build/outputs/apk/release/*.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: ZionChat v${{ steps.get_version.outputs.version }}
        body_path: docs/release-notes/latest.md
        files: |
          app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release build reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports-release
        path: |
          app/build/reports/
          build/reports/
