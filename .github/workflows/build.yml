name: Build and Release ZionChat

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.1.0

    - name: Configure signing (optional)
      env:
        SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      run: |
        if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/zionchat-release.jks"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/zionchat-release.jks" >> $GITHUB_ENV
          echo "SIGNING_STORE_PASSWORD=$SIGNING_STORE_PASSWORD" >> $GITHUB_ENV
          echo "SIGNING_KEY_ALIAS=$SIGNING_KEY_ALIAS" >> $GITHUB_ENV
          echo "SIGNING_KEY_PASSWORD=$SIGNING_KEY_PASSWORD" >> $GITHUB_ENV
        else
          echo "Signing secrets not set; building unsigned release."
        fi

    - name: Build Release APK
      run: gradle assembleRelease --stacktrace --parallel --build-cache

    - name: Run tests
      if: github.event_name == 'pull_request'
      run: gradle test --stacktrace --parallel --build-cache
      continue-on-error: true

    - name: Get version from build.gradle
      id: get_version
      run: |
        VERSION=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName.*"\([0-9.]*\)".*/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ZionChat-v${{ steps.get_version.outputs.version }}
        path: |
          app/build/outputs/apk/release/*.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: ZionChat v${{ steps.get_version.outputs.version }}
        body: |
          ## ZionChat Android 版本 v${{ steps.get_version.outputs.version }}

          ### 发布说明
          - 本次版本包含功能更新与稳定性修复。
          - 详细变更请查看对应提交记录与 PR 说明。

          ### 安装说明
          - 下载下方 APK 并安装到 Android 设备。
          - 如系统提示，请开启“允许安装未知来源应用”。
        files: |
          app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports
        path: |
          app/build/reports/
          build/reports/
